<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cefalù Tourism Dashboard - Advanced Analytics</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --accent: #24b27e;
            --border: #e0e6ed;
            --text-main: #1a1f36;
            --text-sub: #697386;
            --map-base: #dee2e6;
            --map-hover: #457b9d;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 15px; 
            color: var(--text-main);
            overflow-y: auto;
            padding: 50px 15px;
        }
        .main-layout { display: flex; flex-direction: column; gap: 20px; max-width: 1200px; margin: auto; }

        /* RIGHE DASHBOARD */
        .dashboard-row { display: flex; gap: 15px; width: 100%; justify-content: space-between; }
        .row-map { height: 680px; } /* Altezza ridotta per la mappa */
        .row-donuts { height: 350px; }
        .row-chart { height: 670px; }

        .main-panel { flex: 0 0 70%; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 15px; display: flex; flex-direction: column; }
        .side-panel { flex: 0 0 22%; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 20px; overflow-y: auto; }

        /* MAPPA OTTIMIZZATA */
        .map-wrapper { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            background: #ffffff;
            border-radius: 12px;
        }
        svg#italy-map { height: 100%; width: 100%; max-height: auto; } /* Mappa intera e compatta */
        .region { fill: var(--map-base); stroke: #ffffff; stroke-width: 0.8; cursor: pointer; transition: all 0.2s ease; }
        .region:hover { fill: var(--map-hover); }
        .region.active { fill: var(--accent); stroke: #fff; stroke-width: 1.5; }

        /* LAYOUT CIAMBELLE */
        .donut-container { display: flex; justify-content: space-around; align-items: center; height: 100%; width: 100%; }
        .donut-box { flex: 1; height: 100%; min-width: 200px; }

        .header-box { border-left: 4px solid var(--accent); padding-left: 12px; margin-bottom: 30px; }
        h1 { font-size: 1.1em; margin: 0; font-weight: 700; text-transform: uppercase; }
        #chart { flex-grow: 1; width: 100%; }
        
        .report-title { font-size: 1.1em; font-weight: 700; margin-bottom: 15px; border-bottom: 2px solid var(--bg-color); padding-bottom: 8px; }
        .data-group { margin-bottom: 12px; padding: 10px; background: #f8fafc; border-radius: 8px; }
        .group-label { font-size: 0.7em; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--text-sub); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.82em; }
        .value { font-weight: 700; color: var(--text-main); }

        @media (max-width: 1024px) {
            .dashboard-row { flex-direction: column; height: auto !important; }
            .main-panel, .side-panel { flex: none; }
            .donut-container { flex-wrap: wrap; }
        }
        
        @media (min-width: 992px) {
            .no-display { display: none; }
        }

        /* Evoluzione Storica: Plotly su desktop, Chart.js su mobile */
        @media (max-width: 768px) {
            #chart { display: none !important; }
            #mobileChartWrap { display: block !important; }
        }
        @media (min-width: 769px) {
            #mobileChartWrap { display: none !important; }
        }

        /* ---- Info popup ---- */
        .info-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 13px; height: 13px; border-radius: 50%;
            background: transparent; color: var(--text-sub);
            font-size: 8px; font-weight: 700; font-style: normal;
            cursor: pointer; border: 1px solid var(--text-sub); padding: 0; margin-left: 5px;
            vertical-align: middle; line-height: 1; flex-shrink: 0;
            opacity: 0.55; transition: opacity .15s;
        }
        .info-btn:hover { opacity: 1; }

        #infoOverlay {
            display: none; position: fixed; z-index: 9999;
            inset: 0; align-items: center; justify-content: center;
        }
        #infoOverlay.active { display: flex; }

        #infoBackdrop {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.5);
        }
        #infoBox {
            position: relative; z-index: 1;
            background: #fff; border-radius: 12px;
            padding: 20px 18px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.22);
            max-width: 340px; width: calc(100% - 80px);
            font-size: 0.82em; line-height: 1.55; color: var(--text-main);
        }
        #infoBox strong { display: block; margin-bottom: 8px; font-size: 1em; }
        .info-fonte { display: block; margin-top: 13px; font-size: 0.82em; opacity: 0.55; font-style: italic; }
        .data-row { cursor: pointer; border-radius: 3px; margin: 0 -4px; padding: 6px 4px; transition: background .1s; }
        .data-row:hover { background: rgba(0,0,0,0.04); }
        .data-row.dr-open { background: rgba(69,123,157,0.1); border-radius: 3px 3px 0 0; }
        .data-row > span:first-child { flex: 1; }
        .data-row[data-nominal]::after { content: '›'; font-size: 1em; opacity: 0.55; display: inline-block; transform: rotate(90deg); flex-shrink: 0; align-self: center; margin-left: 11px; line-height: 1; transition: transform 0.22s ease, opacity 0.15s; }
        .data-row.dr-open::after { transform: rotate(-90deg); opacity: 0.8; }
        .nominal-row { font-size: 0.76em; color: var(--text-sub); line-height: 1.5; margin: 0 -4px 2px; border-bottom: 1px dashed rgba(0,0,0,0); max-height: 0; overflow: hidden; opacity: 0; padding: 0 4px; transition: max-height 0.28s ease, opacity 0.22s ease, padding 0.28s ease, border-color 0.28s ease; }
        .nominal-row.nom-open { max-height: 300px; opacity: 1; padding: 7px 4px 9px; border-bottom: 1px dashed rgba(0,0,0,0.1); }
        .nom-r { display:flex; justify-content:space-between; gap:8px; margin-bottom:5px; }
        .nom-r b { color:var(--text-main); font-weight:600; white-space:nowrap; }
        #infoClose {
            position: absolute; top: 10px; right: 12px;
            background: none; border: none; font-size: 1.3em;
            cursor: pointer; color: var(--text-sub); line-height: 1;
        }
        @media (max-width: 768px) {
            #infoBox {
                max-width: 100%; width: calc(100% - 70px);
                font-size: 0.95em; padding: 24px 20px 20px;
                border-radius: 16px;
            }
        }

    </style>
</head>
<body>

<div class="main-layout">

    <div class="dashboard-row row-donuts">
        <div class="main-panel" style="flex: 0 100%;">
            <div class="header-box">
                <h1>Analisi Volumi Presenze<br class="no-display"> (Notti totali) <button class="info-btn" onclick="showInfo('chart_donuts')">i</button></h1>
            </div>
            <div class="donut-container">
                <div id="donut-total" class="donut-box"></div>
                <div id="donut-pre" class="donut-box"></div>
                <div id="donut-post" class="donut-box"></div>
            </div>
        </div>
    </div>

    <div class="dashboard-row row-map">
        <div class="main-panel">
            <div class="header-box">
                <h1>Analisi Geografica <button class="info-btn" onclick="showInfo('chart_map')">i</button></h1>
                <p style="color:var(--text-sub); font-size: 0.75em; margin:0;">Click sulla regione per filtrare tutti i report</p>
            </div>
            <div class="map-wrapper">

    // --- 5. LOGICA MAPPA ED EVENTI ---
    function animateViewBox(svg, targetViewBox, duration) {
        const startVB = svg.viewBox.baseVal;
        const start = { x: startVB.x, y: startVB.y, w: startVB.width, h: startVB.height };
        const startTime = performance.now();

        function update(currentTime) {
            let elapsed = currentTime - startTime;
            let progress = Math.min(elapsed / duration, 1);
            const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;

            const curX = start.x + (targetViewBox[0] - start.x) * ease;
            const curY = start.y + (targetViewBox[1] - start.y) * ease;
            const curW = start.w + (targetViewBox[2] - start.w) * ease;
            const curH = start.h + (targetViewBox[3] - start.h) * ease;

            svg.setAttribute('viewBox', `${curX} ${curY} ${curW} ${curH}`);
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

        const yPixel = e.clientY - bbox.top  - fl._size.t;

        if (yPixel < 0 || yPixel > fl._size.h) return;
        const xr = fl.xaxis.range;
        const xValue = xr[0] + (xPixel / fl._size.w) * (xr[1] - xr[0]);
        const yearIdx = Math.round(xValue) - 2004;
        if (yearIdx >= 0 && yearIdx <= 20) showYearlyReport(yearIdx);
    });

    // --- AUTO-SCALING ASSE Y ---
    let _autoScaleTimer = null;
    function handleAutoScale() {
        const xRange = chartDiv.layout.xaxis.range;
        if (!xRange) return;

        let minVal = Infinity;
        let maxVal = -Infinity;
        traces.forEach(trace => {
            trace.x.forEach((x, i) => {
                if (x >= xRange[0] && x <= xRange[1]) {
                    const y = trace.y[i];
                    if (y !== null && y !== undefined) {
                        if (y < minVal) minVal = y;
                        if (y > maxVal) maxVal = y;
                    }
                }
            });
        });

        if (minVal === Infinity) return;

        const padding = (maxVal - minVal) * 0.1 || 5;
        const newYRange = [minVal - padding, maxVal + padding];
        const newDtick = (xRange[1] - xRange[0] < 8) ? 1 : 2;

        const cur = chartDiv.layout.yaxis.range;
        if (!cur || Math.abs(cur[0] - newYRange[0]) > 0.5 || Math.abs(cur[1] - newYRange[1]) > 0.5) {
            Plotly.relayout(chartDiv, { 'yaxis.range': newYRange, 'xaxis.dtick': newDtick });
        }
    }

    function scheduleAutoScale() {
        clearTimeout(_autoScaleTimer);
        _autoScaleTimer = setTimeout(handleAutoScale, 60);
    }

    // Scroll wheel zoom (desktop) e pinch-zoom (mobile) → relayout su X → aggiorna Y
    chartDiv.on('plotly_relayout', function(eventdata) {
        if (eventdata['xaxis.autorange'] === true) return;
        if (eventdata['xaxis.range[0]'] !== undefined || eventdata['xaxis.range'] !== undefined) {
            scheduleAutoScale();
        }
    });

    // Fine pan con mouse → aggiorna Y
    chartDiv.addEventListener('mouseup', () => setTimeout(handleAutoScale, 60));

    // --- MOBILE CHART (Chart.js con touch custom) ---
    if (window.matchMedia('(max-width: 768px)').matches) {
        const mobileCanvas = document.getElementById('mobileChart');
        const dash = [5, 4];
        let _selectedYear = null;

        // Plugin inline: linea 2012 + colonna anno selezionato
        const overlayPlugin = {
            id: 'mobileOverlay',
            afterDraw(chart) {
                const { ctx, scales: { x, y }, chartArea: ca } = chart;
                if (!ca) return;

                // Larghezza di mezzo anno in pixel (per il rettangolo highlight)
                const halfW = Math.abs(x.getPixelForValue(2013) - x.getPixelForValue(2012)) / 2;

                // Colonna anno selezionato
                if (_selectedYear !== null) {
                    const px = x.getPixelForValue(_selectedYear);
                    if (px >= ca.left - halfW && px <= ca.right + halfW) {
                        ctx.save();
                        ctx.fillStyle = 'rgba(230, 57, 70, 0.12)';
                        ctx.fillRect(
                            Math.max(px - halfW, ca.left), ca.top,
                            Math.min(px + halfW, ca.right) - Math.max(px - halfW, ca.left),
                            ca.bottom - ca.top
                        );
                        ctx.restore();
                    }
                }

                // Linea tratteggiata 2012
                const px2012 = x.getPixelForValue(2012);
                if (px2012 >= ca.left && px2012 <= ca.right) {
                    ctx.save();
                    ctx.setLineDash([6, 4]);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(px2012, ca.top);
                    ctx.lineTo(px2012, ca.bottom);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        };

        function mkDataset(label, raw, color, width, isDash) {
            return {
                label,
                data: years.map((y, i) => ({ x: y, y: raw[i] - 100 })),
                borderColor: color,
                borderWidth: width,
                borderDash: isDash ? dash : [],
                pointRadius: isDash ? 1 : 2,
                fill: false,
                tension: 0.1,
                backgroundColor: 'transparent'
            };
        }

        const mobileChartInstance = new Chart(mobileCanvas, {
            type: 'line',
            plugins: [overlayPlugin],
            data: {
                datasets: [
                    mkDataset('Cef: Presenze',  rawData.cefPre, '#e63946', 3,   false),
                    mkDataset('Cef: Arrivi',    rawData.cefArr, '#457b9d', 3,   false),
                    mkDataset('Cef: Alb',       cefAlb,         '#f4a261', 3,   false),
                    mkDataset('Cef: Extra-Alb', rawData.cefExt, '#24b27e', 3,   false),
                    mkDataset('IT: Presenze',   rawData.itPre,  '#00cccc', 1.5, true),
                    mkDataset('IT: Arrivi',     rawData.itArr,  '#ffc300', 1.5, true),
                    mkDataset('IT: Alb',        itAlb,          '#ff8c42', 1.5, true),
                    mkDataset('IT: Extra-Alb',  rawData.itExt,  '#9c27b0', 1.5, true)
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: {
                        type: 'linear',
                        min: 2004, max: 2024,
                        ticks: {
                            stepSize: 2,
                            callback: v => Number.isInteger(v) ? v : '',
                            color: '#697386', font: { size: 10 }
                        },
                        grid: { color: '#f0f2f5' }
                    },
                    y: {
                        ticks: {
                            callback: v => (v > 0 ? '+' : '') + v + '%',
                            color: '#697386', font: { size: 10 }
                        },
                        grid: { color: '#f0f2f5' }
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 18, padding: 8 } },
                    tooltip: { enabled: false }
                }
            }
        });

        // ---- touch handler custom ----
        function touchDist(t) {
            const dx = t[0].clientX - t[1].clientX;
            const dy = t[0].clientY - t[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function clampRange(min, max) {
            const span = max - min;
            if (min < 2003.5) { min = 2003.5; max = min + span; }
            if (max > 2024.5) { max = 2024.5; min = max - span; }
            return [min, max];
        }

        function applyRange(min, max) {
            [min, max] = clampRange(min, max);
            mobileChartInstance.options.scales.x.min = min;
            mobileChartInstance.options.scales.x.max = max;
            mobileChartInstance.update('none');
        }

        let _t = null, _pd = null, _dir = null, _wasPinch = false, _lastTap = 0;
        let _tapStart = null; // {x, y, time}

        mobileCanvas.addEventListener('touchstart', e => {
            _t   = e.touches;
            _pd  = e.touches.length === 2 ? touchDist(e.touches) : null;
            _dir = null;
            if (e.touches.length >= 2) {
                _wasPinch = true;
                _tapStart = null;
            } else if (e.touches.length === 1) {
                _tapStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
            }
        }, { passive: true });

        mobileCanvas.addEventListener('touchmove', e => {
            if (!_t) return;
            const sc   = mobileChartInstance.scales.x;
            const span = sc.max - sc.min;
            const pw   = mobileCanvas.offsetWidth;

            if (e.touches.length === 2) {
                e.preventDefault();
                _dir = 'pinch';
                _wasPinch = true;
                _tapStart = null;
                const cd = touchDist(e.touches);
                if (_pd > 0) {
                    const raw     = _pd / cd;
                    const ratio   = Math.max(0.85, Math.min(1.15, 1 + (raw - 1) * 0.5));
                    const newSpan = Math.max(3, Math.min(21, span * ratio));
                    const mid     = (sc.min + sc.max) / 2;
                    applyRange(mid - newSpan / 2, mid + newSpan / 2);
                }
                _pd = cd;

            } else if (e.touches.length === 1 && _t.length === 1) {
                const dx = e.touches[0].clientX - _t[0].clientX;
                const dy = e.touches[0].clientY - _t[0].clientY;

                if (!_dir) _dir = Math.abs(dx) >= Math.abs(dy) ? 'pan' : 'scroll';

                if (_dir === 'pan') {
                    e.preventDefault();
                    _tapStart = null; // movimento → non è tap
                    const delta = -(dx / pw) * span;
                    applyRange(sc.min + delta, sc.max + delta);
                }
            }
            _t = e.touches;
        }, { passive: false });

        mobileCanvas.addEventListener('touchend', e => {
            const isFinalLift = e.touches.length === 0;

            if (isFinalLift && !_wasPinch && _tapStart) {
                const ct = e.changedTouches[0];
                const dx = Math.abs(ct.clientX - _tapStart.x);
                const dy = Math.abs(ct.clientY - _tapStart.y);
                const dt = Date.now() - _tapStart.time;

                if (dt < 300 && dx < 12 && dy < 12) {
                    const now = Date.now();
                    if (now - _lastTap < 400) {
                        // Doppio tap → reset
                        _selectedYear = null;
                        applyRange(2004, 2024);
                        showTotalReport();
                    } else {
                        // Tap singolo → seleziona anno + colonna highlight
                        const sc       = mobileChartInstance.scales.x;
                        const ca       = mobileChartInstance.chartArea;
                        const rect     = mobileCanvas.getBoundingClientRect();
                        const pxInPlot = ct.clientX - rect.left - ca.left;
                        const dataX    = sc.min + (pxInPlot / ca.width) * (sc.max - sc.min);
                        const year     = Math.round(dataX);
                        const idx      = years.indexOf(year);
                        if (idx !== -1) {
                            _selectedYear = year;
                            mobileChartInstance.update('none');
                            showYearlyReport(idx);
                        }
                    }
                    _lastTap = now;
                }
            }

            if (isFinalLift) {
                _t = null; _pd = null; _dir = null; _wasPinch = false; _tapStart = null;
            } else {
                _t = e.touches;
                _pd = e.touches.length === 2 ? touchDist(e.touches) : null;
            }
        }, { passive: true });
    }

    // Reset totale al doppio click/tap
    chartDiv.on('plotly_doubleclick', () => {
        setTimeout(() => {
            showTotalReport();
            updateDonuts("Italia");
            Plotly.relayout(chartDiv, { 
                'xaxis.dtick': 2,
                'xaxis.autorange': true, 
                'yaxis.autorange': true, 
                'xaxis.range': [2003.5, 2024.5] 
            });
        }, 100);
        return false;
    });

    // --- 7. RENDER ADVANCED ANALYTICS ---

    // Aggiornate le altezze a 320px per sfruttare le card più grandi
    const baseLayout = { margin: { l: 40, r: 15, t: 15, b: 45 }, height: 320, plot_bgcolor: '#ffffff', paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, dragmode: false, displayModeBar: false, xaxis: { tickpad: 8} };

    // A. Stagionalità (Bar Chart)
    Plotly.newPlot('chart-seasonality', [{
        x: advancedData.mesi, y: advancedData.stagionalita2024, type: 'bar', marker: { color: '#457b9d', opacity: 0.8 }
    }], { ...baseLayout, xaxis: { fixedrange: true, tickpad: 8 }, yaxis: { fixedrange: true } }, { responsive: true, displayModeBar: false });

    // B. Origine Residenti vs Stranieri (Stacked Area)
    Plotly.newPlot('chart-origin', [
        { x: advancedData.anni, y: advancedData.stranieri, name: 'Stranieri', fill: 'tozeroy', type: 'scatter', mode: 'none', fillcolor: '#24b27e' },
        { x: advancedData.anni, y: advancedData.residenti, name: 'Italiani', fill: 'tozeroy', type: 'scatter', mode: 'none', fillcolor: '#e63946' }
    ], { ...baseLayout, xaxis: { fixedrange: true, dtick: 2, tickpad: 8 }, yaxis: { fixedrange: true }, showlegend: true, legend: { orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' } }, { responsive: true, displayModeBar: false });

    // C. Permanenza Media (Line Chart)
    Plotly.newPlot('chart-alos', [{
        x: advancedData.anni, y: advancedData.permanenza, type: 'scatter', mode: 'lines+markers', line: { color: '#f72585', width: 3 }
    }], { ...baseLayout, xaxis: { fixedrange: true, dtick: 2, tickpad: 8 }, yaxis: { fixedrange: true, range: [2, 5] } }, { responsive: true, displayModeBar: false });

    // D. Leaderboard Top Cities (Con salto di posizione)
    let lbHtml = '';
    leaderboardData.forEach((row, index) => {
        const isCef = row.citta === 'Cefalù';
        
        // Se è Cefalù, aggiungiamo dei puntini di sospensione per far capire il salto in classifica
        if (isCef) {
            lbHtml += `<div style="text-align: center; color: #aab7c4; margin: 4px 0; font-size: 1.2em;">...</div>`;
        }

        lbHtml += `
            <div class="data-row" style="font-size: 1.05em; margin-bottom: 6px; ${isCef ? 'background: rgba(36, 178, 126, 0.1); padding: 8px; border-radius: 4px; border-left: 4px solid var(--accent); font-weight: bold;' : 'padding: 6px 8px; border-bottom: 1px solid var(--border);'}">
                <span>${row.rank}. ${row.citta}</span>
                <span class="value" style="${isCef ? 'color: var(--accent);' : 'color: var(--text-sub);'}">${row.growth}</span>
            </div>`;
    });
    document.getElementById('leaderboard-content').innerHTML = lbHtml;
</script>

    alb_it: "<strong>Alberghiero — Italia (metodologia)</strong>Dato non rilevato direttamente: calcolato come Presenze_tot − Extra-alberghiero, re-indicizzato a base 2012=100 (alb_base 2012 = 255,6M notti). <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_pre2012_nat: "<strong>Italia — Alberghiero pre-2012 (2004 vs 2012)</strong>Variazione % presenze alberghiere nazionali tra il 2004 e il 2012. Contesto di sistema per leggere il dato di Cefalù: se l'alberghiero nazionale era già in calo verso il 2012, il confronto è più significativo. Derivato: Alb = Presenze_tot − Extra-alb, base 2012=100. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_post2012_nat: "<strong>Italia — Alberghiero post-2012 (2024 vs 2012)</strong>Crescita % presenze alberghiere nazionali dal 2012 al 2024. Confrontato con l'extra-alberghiero rivela tendenze strutturali (alberghi vs ricettività diffusa). Benchmark per Cefalù. Derivato: Alb = Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_preCovid_nat: "<strong>Italia — Alberghiero pre-COVID (2019 vs 2012)</strong>Crescita % alberghiero nazionale tra il 2012 e il 2019. Se Cefalù cresce di più nello stesso segmento, ha beneficiato di fattori specifici (offerta, posizionamento, investimenti). Derivato: Alb = Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_postCovid_nat: "<strong>Italia — Alberghiero post-COVID (2024 vs 2019)</strong>Variazione % alberghiero nazionale tra il 2019 e il 2024. Distingue rimbalzo ciclico da crescita strutturale; riferimento per valutare il recupero di Cefalù nel segmento. Derivato: Alb = Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_post2012_reg: "<strong>Regione — Alberghiero 2014–2024 (base 2014)</strong>Crescita % presenze alberghiere regionali dal 2014 al 2024. Indica se Cefalù stia trainando la crescita alberghiera della regione o seguendo un trend diffuso. Derivato: Alb = Presenze_tot − Extra-alb, base 2014=100. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    alb_preCovid_reg: "<strong>Regione — Alberghiero pre-COVID (2019 vs 2014)</strong>Crescita % presenze alberghiere regionali dal 2014 al 2019. Mostra se la fase espansiva pre-pandemia nel segmento alberghiero fosse diffusa regionalmente o concentrata in specifiche destinazioni. Derivato. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    alb_postCovid_reg: "<strong>Regione — Alberghiero post-COVID (2024 vs 2019)</strong>Dato 2019 ricostruito come (100 + preCovid). Indica se il recupero alberghiero post-pandemia sia generalizzato nella regione o concentrato in pochi comuni. Derivato. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    alb_year_nat: "<strong>Italia — Alberghiero nell'anno selezionato (indice 2012=100)</strong>Benchmark nazionale del segmento alberghiero. Confrontato con Cefalù permette di capire se la performance locale sia eccezionale o in linea col mercato, e se le due serie divergano nel tempo. Derivato. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    alb_pre2012_cef: "<strong>Cefalù — Alberghiero pre-2012 (2004 vs 2012)</strong>Variazione % presenze alberghiere tra il 2004 e il 2012. Mostra se il segmento alberghiero nel 2004 fosse già sopra o sotto il 2012 e come si sia mosso il mix ricettivo (alb vs extra-alb) nel tempo. Derivato: Alb = Presenze_tot − Extra-alb, re-indicizzato a 2012=100 (alb_base = 554.329 notti). <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali.</em>",

    alb_post2012_cef: "<strong>Cefalù — Alberghiero post-2012 (2024 vs 2012)</strong>Crescita % presenze alberghiere dal 2012 al 2024. Confrontata con l'extra-alberghiero rivela se Cefalù evolva verso ricettività strutturata (alberghi) o diffusa (B&amp;B, affitti brevi). Derivato: Alb = Presenze_tot − Extra-alb, base 2012=100. <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali 2014-2024.</em>",

    alb_preCovid_cef: "<strong>Cefalù — Alberghiero pre-COVID (2019 vs 2012)</strong>Crescita % presenze alberghiere dal 2012 al 2019. Una crescita alberghiera già solida pre-COVID rende il dato 2024 ancora più significativo come indicatore di posizionamento strutturale. Derivato: Alb = Presenze_tot − Extra-alb, base 2012=100. <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali 2014-2024.</em>",

    alb_postCovid_cef: "<strong>Cefalù — Alberghiero post-COVID (2024 vs 2019)</strong>Variazione % presenze alberghiere tra il 2019 e il 2024. Indica se il segmento alberghiero abbia recuperato più velocemente dell'extra-alberghiero e se il rimbalzo stia rafforzando la componente strutturata. Derivato: Alb = Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>",

    alb_gap_nat: "<strong>Confronto Alberghiero — Cefalù vs Italia 2024</strong>Differenza in punti indice tra l'alberghiero di Cefalù e quello nazionale (entrambi base 2012=100). Positivo = Cefalù cresce più della media nel segmento strutturato specificamente — forza competitiva delle strutture alberghiere locali. Derivato: Alb = Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT Serie Storiche + dati comunali.</em>",

    alb_year_cef: "<strong>Cefalù — Alberghiero nell'anno selezionato (indice 2012=100)</strong>Variazione % presenze alberghiere rispetto al 2012. Confrontato con presenze totali ed extra-alb mostra l'evoluzione del mix ricettivo anno per anno. Derivato: Alb = Presenze_tot − Extra-alb, re-indicizzato a 2012=100. <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali 2014-2024.</em>",

    year_cef: "<strong>Dettaglio anno — Cefalù</strong>Tutti i valori sono indici base 2012=100 (es: 178 = +78% rispetto al 2012). Alberghiero derivato come Presenze_tot − Extra-alb. Arrivi disponibili solo come indice (vedi i per approfondire). Clicca sul grafico per cambiare anno. <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali 2014-2024.</em>",

    year_it: "<strong>Dettaglio anno — Italia</strong>Indici base 2012=100 per dati nazionali aggregati, in parallelo con Cefalù. Utile per distinguere anno eccezionale per Cefalù da andamento generale di settore. Alb derivato; arrivi solo come indice. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    pre2012_nat: "<strong>Pre-2012 — Italia (2004 vs 2012)</strong>Benchmark nazionale per lo stesso periodo di Cefalù. Se il mercato nazionale era già in calo verso il 2012, il dato di Cefalù pre-2012 va letto in quel contesto. Alb derivato come Presenze_tot − Extra-alb. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    post2012_nat: "<strong>Post-2012 — Italia (2024 vs 2012)</strong>Crescita % nazionale dal 2012 al 2024. Riferimento di sistema: confrontato con Cefalù dice quanto la destinazione abbia cresciuto rispetto al mercato complessivo. Alb derivato. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    preCovid_nat: "<strong>Pre-COVID — Italia (2019 vs 2012)</strong>Crescita nazionale pre-pandemica dal 2012 al 2019. Riferimento per valutare se la crescita di Cefalù nello stesso periodo fosse in linea col sistema o eccezionale. Alb derivato. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    reg_post2012: "<strong>Regione: 2014–2024 (base 2014)</strong>I dati comunali ISTAT sono disponibili dal 2014; l'indice usa base 2014=100. Aggregazione di tutti i comuni della regione selezionata. Formula: (val_2024/val_2014 − 1)×100. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    reg_preCovid: "<strong>Regione: pre-COVID (2019 vs 2014)</strong>Crescita regionale dal 2014 al 2019. Permette di capire se Cefalù crescesse già più o meno della propria regione prima della pandemia. Formula: (val_2019/val_2014 − 1)×100. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    top_preCovid: "<strong>Top City: pre-COVID (2019 vs 2014)</strong>Crescita degli indicatori nel comune selezionato tra il 2014 e il 2019. 'Dati non disponibili' = il comune non aveva voce separata nel file ISTAT 2019. Alb derivato dalla colonna ISTAT diretta (alb_pre_tot). <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>",

    top_post2014: "<strong>Top City: crescita totale (2024 vs 2014)</strong>Indice base 2014=100. Crescita complessiva del comune dal primo anno disponibile al 2024. Su questo indicatore (presenze) è basata la selezione del Top City per ogni regione. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>",

    top_gap: "<strong>Gap vs Media Nazionale al 2024</strong>Differenza in punti indice tra il comune e l'Italia (entrambi base 2014=100). Positivo = il comune cresce più della media; negativo = sotto la media. Indica se la performance sia strutturalmente superiore al sistema o legata al rimbalzo post-COVID. <em class='info-fonte'>Fonte: ISTAT dati comunali + nazionali.</em>",

    chart_donuts: "<strong>Analisi Volumi Presenze — Donut</strong>Tre grafici mostrano la composizione delle presenze (notti) per tipologia ricettiva: • Totale 2024 — distribuzione assoluta alberghiero/extra-alb. • Pre-2012 (2004) — composizione nel primo anno disponibile. • Post-2012 — confronto quote 2024 vs 2012. I valori mostrati sono presenze assolute (notti). <em class='info-fonte'>Fonte: ISTAT Circoscrizioni Turistiche 2004-2013 + dati comunali Cefalù 2014-2024.</em>",

    chart_map: "<strong>Analisi Geografica — Mappa Italia</strong>Clicca su una regione per visualizzare: dati Pre-2012, Post-2012 e Pre-COVID aggregati (indice base 2014=100) e il comune con la maggiore crescita assoluta di presenze 2024 vs 2014 (Top City). I dati regionali sono aggregati dai microdati comunali ISTAT. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>",

    chart_evol: "<strong>Evoluzione Storica — Grafico Lineare</strong>Serie storica 2004–2024, indice base 2012=100 (0 sull'asse Y = livello 2012). Linee continue = Cefalù (Presenze, Arrivi, Alb derivato, Extra-Alb); linee tratteggiate = Italia. L'Alb è derivato come Presenze_tot − Extra-alb, re-indicizzato. La linea verticale indica il 2012 (base).<br><br><em>Desktop: trascina per navigare, rotellina per zoom. Mobile: un dito per navigare, pinch per zoom, doppio tap per resettare.</em> <em class='info-fonte'>Fonte: ISTAT Serie Storiche 1956-2024 + dati comunali.</em>",

    chart_seasonality: "<strong>Stagionalità — Grafico a Barre</strong>Distribuzione mensile delle presenze (notti) nel 2024 per Cefalù. Un indice di stagionalità elevato indica dipendenza dal turismo balneare e vulnerabilità nei mesi invernali. <em class='info-fonte'>Fonte: ISTAT dati comunali Cefalù 2024.</em>",

    chart_origin: "<strong>Origine Turisti — Evoluzione 2014–2024</strong>Composizione delle presenze per provenienza (italiani vs stranieri) anno per anno. Un aumento della quota stranieri indica crescente attrattività internazionale di Cefalù. <em class='info-fonte'>Fonte: ISTAT dati comunali Cefalù 2014-2024.</em>",

    chart_alos: "<strong>Permanenza Media (ALOS — Average Length of Stay)</strong>Rapporto presenze/arrivi per ogni anno: quante notti trascorre in media ogni visitatore a Cefalù. Un calo indica soggiorni più brevi (tendenza nazionale legata a mobilità e multi-destinazione); un aumento indica maggiore fidelizzazione o turismo di lunga permanenza. <em class='info-fonte'>Fonte: ISTAT dati comunali Cefalù 2014-2024.</em>",

    chart_ranking: "<strong>Classifica di Crescita Nazionale</strong>Graduatoria dei comuni italiani per crescita delle presenze 2024 vs 2014 (base 2014=100). Cefalù è evidenziata. La posizione in classifica indica se la crescita locale sia eccezionale o in linea con tendenze diffuse nel panorama turistico nazionale. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>",

    postCovid_nat: "<strong>Post-COVID — Italia (2024 vs 2019)</strong>Recupero e crescita del turismo italiano dal 2019 al 2024. Benchmark per contestualizzare il rimbalzo di Cefalù: se l'Italia complessiva è già sopra il 2019, la barra è alta per valutare l'eccezionalità locale. Formula: (val_2024/val_2019 − 1)×100. Alb derivato. <em class='info-fonte'>Fonte: ISTAT Serie Storiche nazionali 1956-2024.</em>",

    postCovid_reg: "<strong>Regione: post-COVID (2024 vs 2019)</strong>Dato 2019 non disponibile direttamente: ricostruito come (100 + crescita_preCovid). Formula finale: (val_2024/val_2019 − 1)×100. Indica la velocità di recupero regionale dal 2019 al 2024. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024, aggregati per regione.</em>",

    postCovid_top: "<strong>Top City: post-COVID (2024 vs 2019)</strong>Variazione % dal 2019 al 2024 per il comune selezionato. Il livello 2019 è ricostruito da (100 + preArr). Rivela se il boom post-pandemia sia il principale motore della classifica o se la crescita fosse già solida prima. Non disponibile se mancano dati 2019. <em class='info-fonte'>Fonte: ISTAT dati comunali 2014-2024.</em>"
};

function showInfo(key) {
    document.getElementById('infoText').innerHTML = INFO[key] || key;
    document.getElementById('infoOverlay').classList.add('active');
}
function closeInfo() {
    document.getElementById('infoOverlay').classList.remove('active');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInfo(); });
</script>
